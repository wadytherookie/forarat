<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mini Wady </title>
    <!-- Favicon (The cute rabbit in the browser tab) -->
    <link rel="icon" type="image/png" href="https://static.wikia.nocookie.net/chiikawa/images/4/43/YahaUsagi.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;500;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { 
            font-family: 'Quicksand', sans-serif; 
            background: #fffcf2; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            /* Fix for mobile height issues */
            height: 100vh;
            height: -webkit-fill-available;
            overflow: hidden;
            touch-action: manipulation;
        }

        html {
            height: -webkit-fill-available;
        }

        .background-blobs {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: linear-gradient(135deg, #fff9e6 0%, #fff0f3 100%);
        }

        .blob {
            position: absolute;
            filter: blur(80px);
            border-radius: 50%;
            opacity: 0.6;
            animation: float 10s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(20px, -20px); }
        }

        .chat-container {
            width: 100%;
            max-width: 450px;
            height: 100%;
            /* Adjust for mobile header/footer bars */
            max-height: 92vh; 
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 2px solid #fff;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(255, 180, 0, 0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            margin: 10px;
        }

        .chat-header {
            padding: 15px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 214, 224, 0.5);
            background: rgba(255, 255, 255, 0.4);
        }

        .chat-header h1 {
            color: #ff9fb2;
            font-weight: 700;
            font-size: 1.25rem;
            margin-top: 5px;
        }

        .usagi-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 3px solid #ffe066;
            object-fit: cover;
            background: white;
        }

        #chat-display {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            /* Allow smooth scrolling on iOS */
            -webkit-overflow-scrolling: touch; 
        }

        .msg { 
            margin-bottom: 5px; 
            max-width: 85%; 
            line-height: 1.5; 
            font-size: 0.95rem; 
            word-wrap: break-word;
        }
        
        .anne-msg {
            background: #fff9db;
            color: #856404;
            padding: 12px 18px;
            border-radius: 20px 20px 20px 5px;
            align-self: flex-start;
            box-shadow: 2px 2px 8px rgba(255, 230, 0, 0.05);
        }

        .user-msg {
            background: #ffecf1;
            color: #b33a52;
            padding: 12px 18px;
            border-radius: 20px 20px 5px 20px;
            align-self: flex-end;
            box-shadow: 2px 2px 8px rgba(255, 150, 180, 0.05);
        }

        .input-area {
            padding: 15px;
            background: white;
            display: flex;
            gap: 8px;
            align-items: center;
            border-top: 1px solid #fef2f2;
        }

        input {
            flex: 1;
            padding: 12px 20px;
            border-radius: 25px;
            border: 2px solid #fff4da;
            outline: none;
            background: #fffcf5;
            font-size: 16px; /* Prevents auto-zoom on iPhone */
        }

        .send-btn {
            background: #ffe066;
            color: white;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-shrink: 0;
        }

        /* Hide scrollbar but keep functionality */
        #chat-display::-webkit-scrollbar {
            width: 4px;
        }
        #chat-display::-webkit-scrollbar-thumb {
            background: #ffe066;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <div class="background-blobs">
        <div class="blob w-72 h-72 bg-yellow-200 -top-10 -left-10"></div>
        <div class="blob w-64 h-64 bg-pink-100 bottom-10 right-0"></div>
    </div>

    <div class="chat-container">
        <div class="chat-header">
            <div class="flex justify-center">
                <img src="https://static.wikia.nocookie.net/chiikawa/images/4/43/YahaUsagi.png" alt="Usagi" class="usagi-avatar">
            </div>
            <h1>Mini Wady</h1>
            <p class="text-[10px] text-pink-400 font-bold tracking-tight">FOR RAHMA</p>
        </div>

        <div id="chat-display">
            <div class="msg anne-msg">
                Hi Rahma! I'm Mini Wady. I'm here to hang out and be way more fun than the real one. How are you?
            </div>
        </div>

        <div class="input-area">
            <input type="text" id="user-input" placeholder="Type a message..." autocomplete="off">
            <button onclick="handleChat()" class="send-btn">
                <i data-lucide="heart" class="w-5 h-5 fill-current"></i>
            </button>
        </div>
    </div>

    <script>
        lucide.createIcons();

        const BACKEND_URL = 'https://danny-lionhearted-knowingly.ngrok-free.dev'; 

        async function handleChat() {
            const input = document.getElementById('user-input');
            const display = document.getElementById('chat-display');
            const message = input.value.trim();
            if (!message) return;

            // User Message
            const userDiv = document.createElement('div');
            userDiv.className = 'msg user-msg';
            userDiv.textContent = message;
            display.appendChild(userDiv);
            
            input.value = ''; 
            display.scrollTo({ top: display.scrollHeight, behavior: 'smooth' });

            // Loading state
            const typingId = 'typing-' + Date.now();
            const loadingDiv = document.createElement('div');
            loadingDiv.id = typingId;
            loadingDiv.className = 'flex gap-2 items-center px-4 py-2';
            loadingDiv.innerHTML = `
                <div class="w-1.5 h-1.5 bg-pink-300 rounded-full animate-bounce"></div>
                <span class="text-pink-300 text-[10px] font-bold uppercase">Thinking...</span>`;
            display.appendChild(loadingDiv);
            display.scrollTo({ top: display.scrollHeight, behavior: 'smooth' });

            try {
                const response = await fetch(`${BACKEND_URL}/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ "message": message })
                });

                const data = await response.json();
                document.getElementById(typingId).remove();

                const aiDiv = document.createElement('div');
                aiDiv.className = 'msg anne-msg';
                aiDiv.textContent = data.response;
                display.appendChild(aiDiv);
            } catch (error) {
                if(document.getElementById(typingId)) document.getElementById(typingId).remove();
                const errDiv = document.createElement('div');
                errDiv.className = 'text-pink-400 text-[10px] text-center italic py-2';
                errDiv.textContent = 'Mini Wady is napping. Try again later! ✨';
                display.appendChild(errDiv);
            }
            display.scrollTo({ top: display.scrollHeight, behavior: 'smooth' });
        }

        document.getElementById('user-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleChat();
        });
    </script>
</body>
</html>

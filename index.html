<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anne ✨</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;500;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Using Quicksand for a rounder, friendlier font */
        body { 
            font-family: 'Quicksand', sans-serif; 
            background: #fffcf2; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh;
            overflow: hidden;
        }

        /* Dreamy soft yellow & pink background */
        .background-blobs {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: linear-gradient(135deg, #fff9e6 0%, #fff0f3 100%);
        }

        .blob {
            position: absolute;
            filter: blur(80px);
            border-radius: 50%;
            opacity: 0.6;
            animation: float 10s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(20px, -20px); }
        }

        /* Glassmorphism window */
        .chat-container {
            width: 90%;
            max-width: 450px;
            height: 85vh;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(15px);
            border: 2px solid #fff;
            border-radius: 40px;
            box-shadow: 0 20px 40px rgba(255, 180, 0, 0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        .chat-header {
            padding: 25px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 214, 224, 0.5);
        }

        .chat-header h1 {
            color: #ff9fb2;
            font-weight: 700;
            font-size: 1.5rem;
            margin-top: 8px;
        }

        #chat-display {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            scroll-behavior: smooth;
        }

        /* Bubble Styles */
        .msg { margin-bottom: 15px; max-width: 85%; line-height: 1.5; font-size: 0.95rem; }
        
        .anne-msg {
            background: #fff9db;
            color: #856404;
            padding: 15px 20px;
            border-radius: 25px 25px 25px 5px;
            align-self: flex-start;
            box-shadow: 2px 2px 10px rgba(255, 230, 0, 0.1);
        }

        .user-msg {
            background: #ffecf1;
            color: #b33a52;
            padding: 15px 20px;
            border-radius: 25px 25px 5px 25px;
            align-self: flex-end;
            margin-left: auto;
            box-shadow: 2px 2px 10px rgba(255, 150, 180, 0.1);
        }

        .input-area {
            padding: 20px;
            background: white;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        input {
            flex: 1;
            padding: 15px 25px;
            border-radius: 30px;
            border: 2px solid #fff4da;
            outline: none;
            transition: 0.3s;
            background: #fffcf5;
        }

        input:focus { border-color: #ffc2d1; }

        .send-btn {
            background: #ffe066;
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: 0.3s;
        }

        .send-btn:hover { transform: scale(1.1); background: #ff9fb2; }

        .scrollbar-hide::-webkit-scrollbar { width: 5px; }
        .scrollbar-hide::-webkit-scrollbar-thumb { background: #ffe066; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="background-blobs">
        <div class="blob w-96 h-96 bg-yellow-200 -top-20 -left-20"></div>
        <div class="blob w-80 h-80 bg-pink-100 bottom-10 right-0" style="animation-delay: -5s;"></div>
    </div>

    <div class="chat-container">
        <div class="chat-header">
            <div class="flex justify-center">
                <div class="bg-yellow-100 p-3 rounded-full">
                    <i data-lucide="sparkles" class="text-yellow-500 w-6 h-6"></i>
                </div>
            </div>
            <h1>Anne</h1>
            <p class="text-xs text-pink-400 font-medium">For a rat/friend</p>
        </div>

        <div id="chat-display" class="flex flex-col space-y-4 scrollbar-hide">
            <div class="msg anne-msg">
                Hi Rahma!  I'm Anne, a ai that was like very fun to not make (this message was totally written by anne not who u r thinking of). How was your day? I'm so excited to chat with you!
            </div>
        </div>

        <div class="input-area">
            <input type="text" id="user-input" placeholder="Say something sweet...">
            <button onclick="handleChat()" class="send-btn">
                <i data-lucide="heart" class="w-5 h-5 fill-current"></i>
            </button>
        </div>
    </div>

    <script>
        lucide.createIcons();

        // YOUR LIVE NGROK LINK
        const BACKEND_URL = 'https://danny-lionhearted-knowingly.ngrok-free.dev'; 

        async function handleChat() {
            const input = document.getElementById('user-input');
            const display = document.getElementById('chat-display');
            const message = input.value.trim();
            if (!message) return;

            // Rahma's Message
            display.innerHTML += `<div class="msg user-msg">${message}</div>`;
            input.value = ''; 
            display.scrollTop = display.scrollHeight;

            // Soft pink "Processing" indicator
            const typingId = 'typing-' + Date.now();
            display.innerHTML += `
                <div id="${typingId}" class="flex gap-2 items-center px-4 py-2">
                    <div class="w-2 h-2 bg-pink-300 rounded-full animate-bounce"></div>
                    <span class="text-pink-300 text-[10px] font-bold uppercase tracking-widest">Anne is thinking...</span>
                </div>`;
            display.scrollTop = display.scrollHeight;

            try {
                const response = await fetch(`${BACKEND_URL}/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ "message": message })
                });

                const data = await response.json();
                document.getElementById(typingId).remove();

                display.innerHTML += `<div class="msg anne-msg">${data.response}</div>`;
            } catch (error) {
                if(document.getElementById(typingId)) document.getElementById(typingId).remove();
                display.innerHTML += `<div class="text-pink-400 text-[10px] text-center italic">Anne is resting right now. Check back soon! ✨</div>`;
            }
            display.scrollTop = display.scrollHeight;
        }

        document.getElementById('user-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleChat();
        });
    </script>
</body>
</html>
